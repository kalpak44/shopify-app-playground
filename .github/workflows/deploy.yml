name: Deploy Shopify App

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Show deploy context
        run: |
          echo "Commit SHA: $GITHUB_SHA"
          echo "Git HEAD:"
          git rev-parse HEAD
          echo "Block files:"
          find extensions/hello-world-theme/blocks -maxdepth 1 -type f | sort
          echo "general_content.liquid:"
          sed -n '1,220p' extensions/hello-world-theme/blocks/general_content.liquid

      - name: Deploy app
        env:
          SHOPIFY_CLI_PARTNERS_TOKEN: ${{ secrets.SHOPIFY_CLI_PARTNERS_TOKEN }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
        run: shopify app deploy --allow-updates --source-control-url "$COMMIT_URL"
